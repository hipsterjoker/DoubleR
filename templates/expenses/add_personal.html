{% extends "base.html" %}

{% block content %}
<div class="py-4">
    <div class="card-soft p-4 p-md-5" style="max-width: 640px; margin: 0 auto;">
        <h1 class="fw-bold mb-2" style="color: #212121; font-size: 38px;">
            Add Personal Expense
        </h1>

        <form method="POST" action="{{ url_for('expense.add_personal_expense') }}">

            <div class="mb-4">
                <label for="title" class="form-label" style="font-size: 16px;">Title</label>
                <input type="text"
                       class="form-control"
                       id="title"
                       name="title"
                       placeholder="e.g. Coffee, Groceries"
                       required
                       style="font-size: 15px;">
            </div>

            <div class="mb-4">
                <label for="amount" class="form-label" style="font-size: 16px;">Amount</label>
                <input type="number"
                       step="any"
                       onwheel="this.blur()"
                       class="form-control"
                       id="amount"
                       name="amount"
                       placeholder="Enter amount"
                       required
                       style="font-size: 15px;">
            </div>

            <div class="mb-4">
                <label for="category" class="form-label" style="font-size: 16px;">Category</label>
                <select class="form-control form-select"
                        id="category"
                        name="category"
                        style="font-size: 15px;">
                    <option value="">— Select category —</option>
                    {% for cat in categories %}
                        <option value="{{ cat['name'] }}">{{ cat['name'] }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="d-flex gap-3 flex-wrap">
                <button type="submit"
                        class="btn btn-yellow fw-semibold"
                        style="padding: 12px 24px;">
                    Save Expense
                </button>

                <a href="{{ url_for('expense.personal_expenses') }}"
                   class="btn btn-outline-dark-custom fw-semibold"
                   style="padding: 12px 24px;">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
