{% extends "base.html" %}

{% block content %}
<div class="py-4">
    <div class="card-soft p-4 p-md-5" style="max-width: 980px; margin: 0 auto;">
        <h1 class="fw-bold mb-4" style="color: #212121; font-size: 48px;">
            Create Personal Plan
        </h1>

        <form method="POST" action="{{ url_for('personal_plan.create_personal_plan') }}">
            <div class="mb-4">
                <label for="title" class="form-label" style="font-size: 18px;">Plan Title</label>
                <input type="text"
                       class="form-control"
                       id="title"
                       name="title"
                       placeholder="e.g. Korea Trip, April Budget, Shopping Plan"
                       required
                       style="font-size: 16px;">
            </div>

            <div class="mb-4">
                <label for="description" class="form-label" style="font-size: 18px;">Description</label>
                <textarea class="form-control"
                          id="description"
                          name="description"
                          rows="6"
                          placeholder="Optional description for this plan..."
                          style="font-size: 16px; resize: vertical;"></textarea>
            </div>

            <div class="d-flex gap-3 flex-wrap">
                <button type="submit"
                        class="btn btn-yellow fw-semibold"
                        style="padding: 12px 24px;">
                    Create Plan
                </button>

                <a href="{{ url_for('personal_plan.list_personal_plans') }}"
                   class="btn btn-outline-dark-custom fw-semibold"
                   style="padding: 12px 24px;">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
