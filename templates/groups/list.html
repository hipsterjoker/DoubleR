{% extends "base.html" %}

{% block content %}
<h2>My Groups</h2>

<a href="/groups/create" class="btn btn-success mb-3">Create New Group</a>

<ul class="list-group">
    {% for g in groups %}
        <li class="list-group-item d-flex justify-content-between align-items-center">

            <!-- Group Name -->
            <a href="/groups/{{ g['id'] }}">
                {{ g['name'] }}
            </a>

            <!-- Delete Button -->
            <form method="POST"
                  action="/groups/delete/{{ g['id'] }}"
                  style="margin: 0;">
                <button type="submit"
                        class="btn btn-danger btn-sm"
                        onclick="return confirm('Are you sure you want to delete this group?')">
                    Delete
                </button>
            </form>

        </li>
    {% else %}
        <li class="list-group-item">No groups yet.</li>
    {% endfor %}
</ul>
{% endblock %}
