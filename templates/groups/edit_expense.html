{% extends "base.html" %}

{% block content %}
<div class="py-4">
    <div class="card-soft p-4 p-md-5" style="max-width: 980px; margin: 0 auto;">
        <h1 class="fw-bold mb-2" style="color: #212121; font-size: 48px;">
            Edit Expense
        </h1>

        <p class="mb-4" style="color: #6B7280; font-size: 16px;">
            Group: <strong style="color: #212121;">{{ group["name"] }}</strong>
        </p>

        <form method="POST" action="{{ url_for('group.edit_group_expense', expense_id=expense['id'], group_id=group_id) }}">

            <div class="mb-4">
                <label for="title" class="form-label" style="font-size: 18px;">Expense Title</label>
                <input type="text"
                       class="form-control"
                       id="title"
                       name="title"
                       value="{{ expense['title'] }}"
                       required
                       style="font-size: 16px;">
            </div>

            <div class="mb-4">
                <label for="amount" class="form-label" style="font-size: 18px;">Amount</label>
                <input type="number"
                       step="any"
                       onwheel="this.blur()"
                       class="form-control"
                       id="amount"
                       name="amount"
                       value="{{ expense['amount'] }}"
                       required
                       style="font-size: 16px;">
            </div>

            <div class="mb-4">
                <label for="split_type" class="form-label" style="font-size: 18px;">Split Type</label>
                <select id="split_type"
                        name="split_type"
                        class="form-control form-select"
                        onchange="toggleParticipants()"
                        style="font-size: 16px;"
                        required>
                    <option value="all" {% if expense["split_type"] == "all" %}selected{% endif %}>All Members</option>
                    <option value="personal" {% if expense["split_type"] == "personal" %}selected{% endif %}>Personal</option>
                    <option value="selected" {% if expense["split_type"] == "selected" %}selected{% endif %}>Selected Members</option>
                </select>
            </div>

            <div class="mb-4" id="participants-box" style="display: none;">
                <label class="form-label" style="font-size: 18px;">Select Members</label>
                <div class="p-3" style="background-color: #f8f8f8; border-radius: 16px; border: 1px solid #f1f1f1;">
                    {% for m in members %}
                        {% if m["id"] != expense["paid_by"] %}
                            <div class="form-check mb-2">
                                <input class="form-check-input"
                                       type="checkbox"
                                       name="participants"
                                       value="{{ m['id'] }}"
                                       id="member_{{ m['id'] }}"
                                       {% if m['id'] in selected_participant_ids %}checked{% endif %}>
                                <label class="form-check-label" for="member_{{ m['id'] }}" style="color: #212121;">
                                    {{ m["username"] }}
                                </label>
                            </div>
                        {% endif %}
                    {% endfor %}
                    <small style="color: #6B7280;">The payer is included automatically.</small>
                </div>
            </div>

            <div class="mb-4">
                <label for="category" class="form-label" style="font-size: 18px;">Category</label>
                <select class="form-control form-select"
                        id="category"
                        name="category"
                        style="font-size: 16px;">
                    <option value="">— Select category —</option>
                    {% for cat in categories %}
                        <option value="{{ cat['name'] }}"
                            {% if expense['category'] == cat['name'] %}selected{% endif %}>
                            {{ cat['name'] }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="d-flex gap-3 flex-wrap">
                <button type="submit"
                        class="btn btn-yellow fw-semibold"
                        style="padding: 12px 24px;">
                    Update Expense
                </button>

                <a href="{{ url_for('group.group_detail', group_id=group_id) }}"
                   class="btn btn-outline-dark-custom fw-semibold"
                   style="padding: 12px 24px;">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script>
function toggleParticipants() {
    const type = document.getElementById("split_type").value;
    const box = document.getElementById("participants-box");
    box.style.display = (type === "selected") ? "block" : "none";
}

document.addEventListener("DOMContentLoaded", function () {
    toggleParticipants();
});
</script>

{% endblock %}
