{% extends "base.html" %}

{% block content %}
<h2>Edit Group Expense</h2>

<form method="POST">

    <div class="mb-3">
        <label class="form-label">Expense Title</label>
        <input type="text" name="title" class="form-control"
               value="{{ expense['title'] }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Amount</label>
        <input type="number" step="0.01" name="amount" class="form-control"
               value="{{ expense['amount'] }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Split Type</label>
        <select name="split_type" id="split_type" class="form-control" onchange="toggleParticipants()" required>
            <option value="all" {% if expense["split_type"] == "all" %}selected{% endif %}>All Members</option>
            <option value="personal" {% if expense["split_type"] == "personal" %}selected{% endif %}>Personal</option>
            <option value="selected" {% if expense["split_type"] == "selected" %}selected{% endif %}>Selected Members</option>
        </select>
    </div>

    <div class="mb-3" id="participants-box">
        <label class="form-label">Select Members</label>
        {% for m in members %}
            {% if m["id"] != expense["paid_by"] %}
                <div class="form-check">
                    <input class="form-check-input"
                           type="checkbox"
                           name="participants"
                           value="{{ m['id'] }}"
                           id="member_{{ m['id'] }}"
                           {% if m['id'] in selected_participant_ids %}checked{% endif %}>
                    <label class="form-check-label" for="member_{{ m['id'] }}">
                        {{ m["username"] }}
                    </label>
                </div>
            {% endif %}
        {% endfor %}
        <small class="text-muted">
            The payer is included automatically. Select one or more other members.
        </small>
    </div>

    <button type="submit" class="btn btn-success">Update Expense</button>
    <a href="/groups/{{ group_id }}" class="btn btn-secondary">Cancel</a>

</form>

<script>
function toggleParticipants() {
    const splitType = document.getElementById("split_type").value;
    const box = document.getElementById("participants-box");

    if (splitType === "selected") {
        box.style.display = "block";
    } else {
        box.style.display = "none";
    }
}

document.addEventListener("DOMContentLoaded", function () {
    toggleParticipants();
});
</script>

{% endblock %}
