{% extends 'base.html' %}

{% block page_background %}
<div class="auth-bg"></div>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 85vh;">
    <div class="w-100" style="max-width: 460px;">

        <!-- Logo -->
        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center gap-3">
                <div class="d-flex justify-content-center align-items-center shadow-sm"
                     style="width: 56px; height: 56px; background-color: #FFC107; border-radius: 18px;">
                    <span style="font-size: 26px;">💼</span>
                </div>
                <div class="text-start">
                    <h2 class="mb-0 fw-bold" style="color: #212121; font-size: 22px;">DoubleR</h2>
                    <small style="color: #6B7280;">Personal & Group Expense Manager</small>
                </div>
            </div>
        </div>

        <!-- Card -->
        <div class="card border-0 shadow-sm" style="border-radius: 28px;">
            <div class="card-body p-4 p-md-5">

                <!-- Title -->
                <div class="text-center mb-4">
                    <h2 class="fw-bold mb-2" style="color: #212121; font-size: 26px;">
                        Welcome back
                    </h2>
                    <p class="mb-0" style="color: #6B7280; font-size: 15px;">
                        Sign in to continue managing your expenses
                    </p>
                </div>

                <!-- Form -->
                <form method="POST" action="{{ url_for('auth.login') }}">

                    <div class="mb-3">
                        <label class="form-label fw-semibold" style="color: #212121;">
                            Email
                        </label>
                        <input type="email"
                               name="email"
                               class="form-control"
                               placeholder="Enter your email"
                               required
                               style="border-radius: 16px; padding: 14px 16px; background-color: #f5f5f5; border: 1px solid transparent;">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold" style="color: #212121;">
                            Password
                        </label>
                        <input type="password"
                               name="password"
                               class="form-control"
                               placeholder="Enter your password"
                               required
                               style="border-radius: 16px; padding: 14px 16px; background-color: #f5f5f5; border: 1px solid transparent;">
                    </div>

                    <button type="submit"
                            class="btn w-100 fw-bold"
                            style="background-color: #FFC107; color: #212121; border-radius: 16px; padding: 14px;">
                        Login
                    </button>
                </form>

                <!-- Footer -->
                <div class="text-center mt-4">
                    <p class="mb-0" style="color: #6B7280;">
                        Don’t have an account?
                        <a href="{{ url_for('auth.register') }}"
                           class="fw-semibold text-decoration-none"
                           style="color: #212121;">
                            Register
                        </a>
                    </p>
                </div>

            </div>
        </div>

    </div>
</div>
{% endblock %}
