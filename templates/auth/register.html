{% extends 'base.html' %}

{% block page_background %}
<div class="auth-bg"></div>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 85vh;">
    <div class="w-100" style="max-width: 460px;">

        <!-- Logo -->
        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center gap-3">
                <div class="d-flex justify-content-center align-items-center shadow-sm"
                     style="width: 56px; height: 56px; background-color: #FFC107; border-radius: 18px;">
                    <span style="font-size: 26px;">💼</span>
                </div>
                <div class="text-start">
                    <h2 class="mb-0 fw-bold" style="color: #212121; font-size: 22px;">DoubleR</h2>
                    <small style="color: #6B7280;">Personal & Group Expense Manager</small>
                </div>
            </div>
        </div>

        <!-- Card -->
        <div class="card border-0 shadow-sm" style="border-radius: 28px;">
            <div class="card-body p-4 p-md-5">

                <!-- Title -->
                <div class="text-center mb-4">
                    <h2 class="fw-bold mb-2" style="color: #212121; font-size: 26px;">
                        Create account
                    </h2>
                    <p class="mb-0" style="color: #6B7280; font-size: 15px;">
                        Sign up to start managing your expenses
                    </p>
                </div>

                <!-- Form -->
                <form method="POST" action="{{ url_for('auth.register') }}">

                    <div class="mb-3">
                        <label class="form-label fw-semibold" style="color: #212121;">
                            Username
                        </label>
                        <input type="text"
                               name="username"
                               class="form-control"
                               placeholder="Enter your username"
                               required
                               style="border-radius: 16px; padding: 14px 16px; background-color: #f5f5f5; border: 1px solid transparent;">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" style="color: #212121;">
                            Email
                        </label>
                        <input type="email"
                               name="email"
                               class="form-control"
                               placeholder="Enter your email"
                               required
                               style="border-radius: 16px; padding: 14px 16px; background-color: #f5f5f5; border: 1px solid transparent;">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold" style="color: #212121;">
                            Password
                        </label>
                        <div style="position: relative;">
                            <input type="password"
                                   id="register_password"
                                   name="password"
                                   class="form-control"
                                   placeholder="Create a password"
                                   minlength="8"
                                   required
                                   style="border-radius: 16px; padding: 14px 16px; background-color: #f5f5f5; border: 1px solid transparent; padding-right: 60px;">
                            <button type="button"
                                    onclick="var i=document.getElementById('register_password'); i.type=i.type==='password'?'text':'password'; this.textContent=i.type==='password'?'Show':'Hide';"
                                    style="position:absolute; right:16px; top:50%; transform:translateY(-50%); background:none; border:none; color:#6B7280; cursor:pointer; font-size:13px; font-weight:600; padding:0;">
                                Show
                            </button>
                        </div>
                        <small style="color: #6B7280; font-size: 13px; margin-top: 6px; display: block;">
                            Must be at least 8 characters.
                        </small>
                    </div>

                    <button type="submit"
                            class="btn w-100 fw-bold"
                            style="background-color: #FFC107; color: #212121; border-radius: 16px; padding: 14px;">
                        Register
                    </button>
                </form>

                <!-- Footer -->
                <div class="text-center mt-4">
                    <p class="mb-0" style="color: #6B7280;">
                        Already have an account?
                        <a href="{{ url_for('auth.login') }}"
                           class="fw-semibold text-decoration-none"
                           style="color: #212121;">
                            Login
                        </a>
                    </p>
                </div>

            </div>
        </div>

    </div>
</div>
{% endblock %}
